import = [
  "~/.config/alacritty/themes/themes/poimandres.toml"
]

[env]
TERM = "xterm-256color"

[window]
padding.x = 15
padding.y = 15
dimensions = { columns = 150, lines = 40}
position = { x = 340, y = 320 }

decorations = "Buttonless"

opacity = 1
# blur = true

option_as_alt = "Both"

[font]
normal.family = "JetBrainsMono Nerd Font Mono"
size = 16

[cursor]
style = { shape = "Beam", blinking = "Always" }
