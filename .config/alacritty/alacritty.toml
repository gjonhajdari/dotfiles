import = [
  "~/.config/alacritty/themes/themes/poimandres.toml"
]

[env]
TERM = "xterm-256color"

[window]
padding.x = 15
padding.y = 15
dimensions = { columns = 115, lines = 35}

decorations = "Buttonless"

opacity = 1
# blur = true

option_as_alt = "Both"

[font]
normal.family = "JetBrainsMono Nerd Font Mono"
size = 16

[cursor]
style = { shape = "Beam", blinking = "Always" }
